name: Deploy Affiliate Site

on:
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-affiliate-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Verify docs exists
        run: |
          if [ ! -d ./docs ]; then
            echo "ERROR: ./docs directory not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
